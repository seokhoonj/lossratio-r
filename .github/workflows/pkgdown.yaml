# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build English site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Build Korean site
        run: |
          cp _pkgdown.yml _pkgdown.en.yml.bak
          cp README.md README.en.md.bak
          cp _pkgdown.ko.yml _pkgdown.yml
          cp README.ko.md README.md
          Rscript -e 'pkgdown::build_site(new_process = FALSE, install = FALSE, override = list(destination = "docs/ko"))'
          mv README.en.md.bak README.md
          mv _pkgdown.en.yml.bak _pkgdown.yml
        shell: bash

      - name: Fix sitemaps and add robots.txt
        run: |
          # pkgdown's sitemap.xml is missing the XML declaration and uses
          # a non-standard xmlns syntax (space + single quotes), which
          # Google Search Console rejects. Rewrite it as a valid sitemap.
          for f in docs/sitemap.xml docs/ko/sitemap.xml; do
            [ -f "$f" ] || continue

            # Normalize urlset namespace (handle space/quote variations)
            sed -i "s|<urlset xmlns *= *['\"]http://www.sitemaps.org/schemas/sitemap/0.9['\"]>|<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">|" "$f"

            # Add XML declaration only if missing (idempotent)
            if ! head -n 1 "$f" | grep -q '<?xml'; then
              sed -i '1i<?xml version="1.0" encoding="UTF-8"?>' "$f"
            fi
          done

          cat > docs/robots.txt <<'EOF'
          User-agent: *
          Allow: /

          Sitemap: https://seokhoonj.github.io/lossratio/sitemap.xml
          Sitemap: https://seokhoonj.github.io/lossratio/ko/sitemap.xml
          EOF
        shell: bash

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
