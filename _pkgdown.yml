url: https://seokhoonj.github.io/lossratio

template:
  bootstrap: 5
  includes:
    in_header: |
      <meta name="google-site-verification" content="9-dA4_Uuy20hNJ7t5reHrOAEZSy0K_JKK62xO7K3Qxs" />

home:
  title: lossratio
  description: Loss ratio analysis and projection for insurance experience data.

navbar:
  structure:
    left:  [intro, articles, reference, news]
    right: [lang_switch, search, github]
  components:
    lang_switch:
      text: "🇰🇷 한국어"
      href: ko/
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
      - text: All articles
        href: articles/index.html
      - text: -------
      - text: Aggregation frameworks
        href: articles/aggregation-frameworks.html
      - text: Triangle and ATA diagnostics
        href: articles/triangle-diagnostics.html
      - text: Loss ratio projection methods
        href: articles/loss-ratio-methods.html
      - text: Loss ratio convergence
        href: articles/lr-convergence.html
      - text: Regime detection
        href: articles/regime-detection.html
      - text: Regime break filtering
        href: articles/regime-break.html
      - text: Backtest
        href: articles/backtest.html
      - text: -------
      - text: (Reference) Chain ladder reserving
        href: articles/chain-ladder.html
    language:
      text: KO
      href: ./ko/

reference:
- title: Input layer
  desc: >
    Validation, coercion, and helpers for raw experience data.
  contents:
  - check_experience
  - is_experience
  - as_experience
  - add_experience_period
  - validate_triangle

- title: Aggregation builders
  desc: >
    Three frameworks for viewing the same long-format experience data —
    cohort × dev (`Triangle`), calendar period (`Calendar`), or
    portfolio total (`Total`).
  contents:
  - build_triangle
  - build_calendar
  - build_total

- title: Age-to-age (ATA) factors
  desc: Building blocks of the chain-ladder method.
  contents:
  - build_ata
  - fit_ata
  - summary.ATA
  - find_ata_maturity

- title: Exposure-driven (ED) intensity
  desc: Building blocks of the exposure-driven method.
  contents:
  - build_ed
  - fit_ed
  - summary.ED

- title: Projection
  desc: >
    Chain ladder and loss-ratio projection. `fit_lr` supports three
    methods — `"sa"` (stage-adaptive, default), `"ed"`, and `"cl"`.
  contents:
  - fit_cl
  - fit_lr

- title: Regime detection
  desc: Structural change detection across underwriting cohorts.
  contents:
  - detect_cohort_regime

- title: Backtest
  desc: >
    Hold out the latest calendar diagonals from a triangle, refit, and
    compare projections against the withheld actuals.
  contents:
  - backtest

- title: Loss ratio convergence detection
  desc: >
    Detect the development period ($k^{**}$) from which the projected
    loss ratio stops revising and converges.
  contents:
  - find_lr_convergence

- title: Visualisation
  desc: >
    `plot()` (base generic) and `plot_triangle()` (lossratio generic)
    dispatch on the object class.
  contents:
  - plot_triangle
  - starts_with("plot.")
  - starts_with("plot_triangle.")

- title: Other S3 methods
  desc: print / summary / longer methods registered on package classes.
  contents:
  - starts_with("print.")
  - starts_with("summary.")
  - starts_with("longer.")

- title: Helpers
  contents:
  - get_recent_weights
  - longer

- title: Datasets
  contents:
  - experience

