reference:
- title: Input layer
  desc: >
    Validation and grain helpers for raw experience data. `build_triangle()`
    already runs the required checks and coercions inline — these helpers
    are exposed for users who want to validate or enrich without building
    a triangle.
  contents:
  - derive_grain_columns
  - validate_triangle

- title: Aggregation builders
  desc: >
    Three frameworks for viewing the same long-format experience data —
    cohort × dev (`Triangle`), calendar period (`Calendar`), or
    portfolio total (`Total`).
  contents:
  - build_triangle
  - build_calendar
  - build_total

- title: Link table
  desc: >
    Long-format intermediate underlying both the chain-ladder (ATA) and
    exposure-driven (ED) workflows. Built once, summarised differently
    via `summary.Link()`'s `model` argument.
  contents:
  - build_link
  - summary.Link

- title: Estimation
  desc: >
    Models that produce full projections on a Triangle. Base algorithms:
    `fit_cl` (chain ladder / multiplicative), `fit_ed`
    (exposure-driven / additive). Role dispatchers:
    `fit_loss` (loss-side sa/ed/cl), `fit_premium` (premium-side ed/cl).
    Composition: `fit_lr` (loss-ratio umbrella with delta-method SE).
    All return an object carrying a `$full` projection table.
  contents:
  - fit_cl
  - fit_ed
  - fit_loss
  - fit_premium
  - fit_lr

- title: Factor diagnostics
  desc: >
    Per-link factor estimation at the *factor level*. Both `fit_ata`
    (multiplicative ATA factors `f_k`) and `fit_intensity`
    (ED-style additive intensities `g_k`) return per-link factors
    with standard errors and diagnostic stats — without producing a
    full projection. `fit_ata` feeds into `fit_cl`,
    `detect_maturity()`, and the SA stage transition in `fit_lr`;
    `fit_intensity` feeds into `fit_ed` and is the ED counterpart
    diagnostic.
  contents:
  - fit_ata
  - fit_intensity

- title: Cell-selection diagnostics
  desc: >
    Decide which cells of the triangle to use for estimation.
    `detect_maturity` works along the dev axis (link beyond which
    ATA factors are stable); `detect_regime` works along the cohort
    axis (structural break across underwriting cohorts).
  contents:
  - detect_maturity
  - detect_regime

- title: Projection diagnostic
  desc: >
    Operates on a fitted `LRFit`, not on the raw triangle. Locates
    the valuation depth $v$ at which the projected ultimate loss
    ratio stops revising under a dual criterion (predictive revision
    below noise threshold AND cross-cohort dispersion small,
    sustained over M consecutive valuations).
  contents:
  - detect_convergence

- title: Backtest
  desc: >
    Hold out the latest calendar diagonals from a triangle, refit, and
    compare projections against the withheld actuals.
  contents:
  - backtest

- title: Visualisation
  desc: >
    `plot()` (base generic) and `plot_triangle()` (lossratio generic)
    dispatch on the object class.
  contents:
  - plot_triangle
  - starts_with("plot.")
  - starts_with("plot_triangle.")

- title: Other S3 methods
  desc: print / summary / longer methods registered on package classes.
  contents:
  - starts_with("print.")
  - starts_with("summary.")
  - starts_with("longer.")

- title: Helpers
  contents:
  - get_recent_weights
  - longer

- title: Datasets
  contents:
  - experience

