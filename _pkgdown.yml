reference:
- title: Input layer
  desc: >
    Validation, coercion, and helpers for raw experience data.
  contents:
  - check_experience
  - is_experience
  - as_experience
  - add_experience_period
  - validate_triangle

- title: Aggregation builders
  desc: >
    Three frameworks for viewing the same long-format experience data —
    cohort × dev (`Triangle`), calendar period (`Calendar`), or
    portfolio total (`Total`).
  contents:
  - build_triangle
  - build_calendar
  - build_total

- title: Link table
  desc: >
    Long-format intermediate underlying both the chain-ladder (ATA) and
    exposure-driven (ED) workflows. Built once, summarised differently
    via `summary.Link()`'s `model` argument.
  contents:
  - build_link
  - summary.Link

- title: Estimation
  desc: >
    Per-link factor estimation (`fit_ata`, `fit_ed`) and full
    projection (`fit_cl`, `fit_lr`). `fit_lr` supports three methods —
    `"sa"` (stage-adaptive, default), `"ed"`, and `"cl"`.
  contents:
  - fit_ata
  - fit_ed
  - fit_cl
  - fit_lr

- title: Cell-selection diagnostics
  desc: >
    Decide which cells of the triangle to use for estimation.
    `detect_maturity` works along the dev axis (link beyond which
    ATA factors are stable); `detect_regime` works along the cohort
    axis (structural break across underwriting cohorts).
  contents:
  - detect_maturity
  - detect_regime

- title: Projection diagnostic
  desc: >
    Operates on a fitted `LRFit`, not on the raw triangle. Locates
    the valuation depth $v$ at which the projected ultimate loss
    ratio stops revising under a dual criterion (predictive revision
    below noise threshold AND cross-cohort dispersion small,
    sustained over M consecutive valuations).
  contents:
  - detect_convergence

- title: Backtest
  desc: >
    Hold out the latest calendar diagonals from a triangle, refit, and
    compare projections against the withheld actuals.
  contents:
  - backtest

- title: Visualisation
  desc: >
    `plot()` (base generic) and `plot_triangle()` (lossratio generic)
    dispatch on the object class.
  contents:
  - plot_triangle
  - starts_with("plot.")
  - starts_with("plot_triangle.")

- title: Other S3 methods
  desc: print / summary / longer methods registered on package classes.
  contents:
  - starts_with("print.")
  - starts_with("summary.")
  - starts_with("longer.")

- title: Helpers
  contents:
  - get_recent_weights
  - longer

- title: Datasets
  contents:
  - experience

