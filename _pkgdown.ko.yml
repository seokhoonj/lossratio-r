reference:
- title: 입력 계층
  desc: >
    원시 experience 데이터의 검증·코어션 헬퍼.
  contents:
  - check_experience
  - is_experience
  - as_experience
  - add_experience_period
  - validate_triangle

- title: 집계 빌더
  desc: >
    같은 long-format experience 데이터를 보는 세 가지 프레임워크 —
    cohort × dev (`Triangle`), 달력 기간 (`Calendar`),
    포트폴리오 전체 (`Total`).
  contents:
  - build_triangle
  - build_calendar
  - build_total

- title: 단계 연결 테이블
  desc: >
    Chain ladder (ATA) 와 노출 기반 (ED) 의 공통 long-format intermediate.
    `summary.Link()` 의 `model` 인자로 두 모형의 진단을 분기.
  contents:
  - build_link
  - summary.Link

- title: 추정
  desc: >
    링크별 인자 추정 (`fit_ata`, `fit_ed`) 과 전체 예측 (`fit_cl`,
    `fit_lr`). `fit_lr` 은 세 가지 method 지원 — `"sa"` (단계 적응형,
    default), `"ed"`, `"cl"`.
  contents:
  - fit_ata
  - fit_ed
  - fit_cl
  - fit_lr

- title: 추정 셀 선택 진단
  desc: >
    Triangle 의 어떤 셀을 추정에 쓸지 결정. `detect_maturity` 는
    dev 축 (ATA 인자가 안정화되는 링크 이후), `detect_regime` 은
    cohort 축 (인수 코호트 간 구조적 변화).
  contents:
  - detect_maturity
  - detect_regime

- title: 예측 진단
  desc: >
    적합 결과 `LRFit` 위에서 동작 (raw Triangle 아님). 예측 손해율의
    갱신이 멈추는 valuation 깊이 $v$ 를 dual criterion (예측 갱신이
    잡음 수준 이하 AND 코호트 간 분산이 작음, M 회 연속) 으로 탐지.
  contents:
  - detect_convergence

- title: Backtest
  desc: >
    Triangle 의 최근 대각선을 보류한 뒤 재적합·예측을 보류된 실제값과
    비교.
  contents:
  - backtest

- title: 시각화
  desc: >
    `plot()` (base generic) 과 `plot_triangle()` (lossratio generic)
    이 객체 클래스에 따라 dispatch.
  contents:
  - plot_triangle
  - starts_with("plot.")
  - starts_with("plot_triangle.")

- title: 기타 S3 메서드
  desc: 패키지 클래스에 등록된 print / summary / longer 메서드.
  contents:
  - starts_with("print.")
  - starts_with("summary.")
  - starts_with("longer.")

- title: 헬퍼
  contents:
  - get_recent_weights
  - longer

- title: 데이터셋
  contents:
  - experience

