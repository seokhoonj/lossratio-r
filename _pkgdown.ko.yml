reference:
- title: 입력 계층
  desc: >
    원시 experience 데이터의 검증·grain 헬퍼. `build_triangle()` 이 필수
    검증·코어션을 내부에서 수행하므로 일반 흐름엔 불필요하며, Triangle 을
    만들지 않고 검증·enrichment 만 하고 싶을 때 사용한다.
  contents:
  - derive_grain_columns
  - validate_triangle

- title: 집계 빌더
  desc: >
    같은 long-format experience 데이터를 보는 세 가지 프레임워크 —
    cohort × dev (`Triangle`), 달력 기간 (`Calendar`),
    포트폴리오 전체 (`Total`).
  contents:
  - build_triangle
  - build_calendar
  - build_total

- title: 단계 연결 테이블
  desc: >
    Chain ladder (ATA) 와 노출 기반 (ED) 의 공통 long-format intermediate.
    `summary.Link()` 의 `model` 인자로 두 모형의 진단을 분기.
  contents:
  - build_link
  - summary.Link

- title: 추정
  desc: >
    Triangle 위에서 projection 을 산출하는 모형. 기본 알고리즘:
    `fit_cl` (chain ladder / multiplicative), `fit_ed`
    (exposure-driven / additive). Role dispatcher: `fit_loss`
    (loss 측 sa/ed/cl), `fit_premium` (premium 측 ed/cl). 합성:
    `fit_lr` (손해율 통합 인터페이스, delta-method SE). 모두 결과
    객체에 `$full` projection table 을 보유.
  contents:
  - fit_cl
  - fit_ed
  - fit_loss
  - fit_premium
  - fit_lr

- title: 인자 진단
  desc: >
    Factor level 의 링크별 인자 추정. `fit_ata` (multiplicative ATA
    인자 `f_k`) 와 `fit_intensity` (ED 의 additive intensity `g_k`)
    가 짝. 두 함수 모두 projection 은 산출하지 않고 인자·SE·진단
    stat 만 반환. `fit_ata` 는 `fit_cl`, `detect_maturity()`,
    `fit_lr(method = "sa")` 의 stage transition 에서 사용되고,
    `fit_intensity` 는 `fit_ed` 의 짝 diagnostic.
  contents:
  - fit_ata
  - fit_intensity

- title: 추정 셀 선택 진단
  desc: >
    Triangle 의 어떤 셀을 추정에 쓸지 결정. `detect_maturity` 는
    dev 축 (ATA 인자가 안정화되는 링크 이후), `detect_regime` 은
    cohort 축 (인수 코호트 간 구조적 변화). `*_at()` / `*_spec()`
    헬퍼는 fit 함수의 `maturity` / `loss_regime` / `premium_regime`
    인자에 들어갈 수동 (`_at()`) 혹은 lazy-detect (`_spec()`) 입력
    객체를 만든다.
  contents:
  - detect_maturity
  - detect_regime
  - maturity_at
  - maturity_spec
  - regime_at
  - regime_spec

- title: 예측 진단
  desc: >
    적합 결과 `LRFit` 위에서 동작 (raw Triangle 아님). 예측 손해율의
    갱신이 멈추는 valuation 깊이 $v$ 를 dual criterion (예측 갱신이
    잡음 수준 이하 AND 코호트 간 분산이 작음, M 회 연속) 으로 탐지.
  contents:
  - detect_convergence

- title: Backtest
  desc: >
    Triangle 의 최근 대각선을 보류한 뒤 재적합·예측을 보류된 실제값과
    비교.
  contents:
  - backtest

- title: 시각화
  desc: >
    `plot()` (base generic) 과 `plot_triangle()` (lossratio generic)
    이 객체 클래스에 따라 dispatch.
  contents:
  - plot_triangle
  - starts_with("plot.")
  - starts_with("plot_triangle.")

- title: 기타 S3 메서드
  desc: 패키지 클래스에 등록된 print / summary / longer 메서드.
  contents:
  - starts_with("print.")
  - starts_with("summary.")
  - starts_with("longer.")

- title: 헬퍼
  contents:
  - get_recent_weights
  - longer
  - mask_triangle

- title: 데이터셋
  contents:
  - experience

